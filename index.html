<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Lịch Tập Luyện Cá Nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-background"></div>
    
    <!-- Cờ chọn ngôn ngữ nằm hoàn toàn độc lập, tách ra khỏi header Lịch -->
    <button id="btnLangToggle" class="lang-toggle-btn active" title="Đổi Ngôn Ngữ / Switch Language">
        <img id="flagIcon" src="https://flagcdn.com/w40/vn.png" alt="VN">
    </button>
    
    <div class="app-container">
        <!-- Calendar Section -->
        <main class="calendar-section glass-panel">
            <header class="calendar-header">
                <div class="calendar-nav">
                    <button id="prevMonth" class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                    <div class="month-display">
                        <h2 id="currentMonthYear">Tháng 10, 2023</h2>
                    </div>
                    <button id="nextMonth" class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                
                <div class="date-jump-controls">
                    <button id="btnToday" class="today-btn" data-i18n="todayBtn">Hôm nay</button>
                    <input type="date" id="jumpDateInput" class="jump-date-input" title="Chọn ngày để chuyển đến">
                </div>
            </header>
            
            <div class="weekdays">
                <div>CN</div><div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div>
            </div>
            
            <div id="calendarGrid" class="calendar-grid">
                <!-- Days will be generated by JS -->
            </div>
            
            <!-- Box Ghi chú chuyển sang trong Lịch -->
            <div class="calendar-footer">
                <div class="notes-card glass-panel">
                    <h3 data-i18n="notesTitle">Ghi chú</h3>
                    <textarea id="dailyNote" data-i18n-placeholder="notesPlaceholder" placeholder="Nhập ghi chú cho ngày này..."></textarea>
                </div>
            </div>
        </main>

        <!-- Sidebar / Action Section -->
        <aside class="action-section">
            <div class="current-date-card glass-panel">
                <div class="solar-date-display">
                    <span id="displayDayName" class="day-name">Thứ Hai</span>
                    <span id="displayDate" class="date-num">15</span>
                    <span id="displayMonthYear" class="month-year">Tháng 10, 2023</span>
                </div>
                <div class="lunar-date-display">
                    <span data-i18n="lunarText">Âm lịch: </span><strong id="displayLunarDate">1/9</strong>
                </div>
            </div>

            <div class="habits-card glass-panel">
                <h3 data-i18n="habitsTitle">Thói Quen Mỗi Ngày</h3>
                <p class="subtitle" data-i18n="habitsSub">Đánh dấu khi bạn hoàn thành</p>
                
                <div class="habit-list">
                    <label class="habit-item">
                        <input type="checkbox" id="checkThien" value="thien">
                        <span class="checkmark"></span>
                        <div class="habit-info">
                            <i class="fa-solid fa-om habit-icon"></i>
                            <span data-i18n="habitThien">Thiền</span>
                        </div>
                    </label>

                    <label class="habit-item">
                        <input type="checkbox" id="checkYoga" value="yoga">
                        <span class="checkmark"></span>
                        <div class="habit-info">
                            <i class="fa-solid fa-person-praying habit-icon"></i>
                            <span data-i18n="habitYoga">Yoga</span>
                        </div>
                    </label>

                    <label class="habit-item">
                        <input type="checkbox" id="checkPushup" value="pushup">
                        <span class="checkmark"></span>
                        <div class="habit-info">
                            <i class="fa-solid fa-dumbbell habit-icon"></i>
                            <span data-i18n="habitPushup">Push up</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="stats-card glass-panel">
                <h3 data-i18n="statsTitle">Thống Kê Tiến Độ</h3>
                
                <div class="tabs">
                    <button class="tab-btn active" data-range="week" data-i18n="tabWeek">Tuần</button>
                    <button class="tab-btn" data-range="month" data-i18n="tabMonth">Tháng</button>
                    <button class="tab-btn" data-range="year" data-i18n="tabYear">Năm</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-icon thien-color"><i class="fa-solid fa-om"></i></div>
                        <div class="stat-details">
                            <span class="stat-label" data-i18n="statThien">Thiền</span>
                            <span class="stat-value" id="statThien">0</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon yoga-color"><i class="fa-solid fa-person-praying"></i></div>
                        <div class="stat-details">
                            <span class="stat-label" data-i18n="statYoga">Yoga</span>
                            <span class="stat-value" id="statYoga">0</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon pushup-color"><i class="fa-solid fa-dumbbell"></i></div>
                        <div class="stat-details">
                            <span class="stat-label" data-i18n="statPushup">Push up</span>
                            <span class="stat-value" id="statPushup">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Firebase SDK (Version 8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Script that translates solar dates to lunar dates -->
    <script src="https://unpkg.com/lunar-javascript/lunar.js"></script>
    <script src="script.js"></script>
</body>
</html>
