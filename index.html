<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Lịch Tập Luyện Cá Nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-background"></div>
    
    <!-- Nút Đổi ngôn ngữ ở góc phải -->
    <div class="top-right-controls">
        <button id="btnLangToggle" class="lang-toggle-btn active" title="Đổi Ngôn Ngữ / Switch Language">
            <img id="flagIcon" src="https://flagcdn.com/w40/vn.png" alt="VN">
        </button>
    </div>

    <!-- Modal Cài đặt Hoạt động -->
    <div id="settingsModal" class="modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2 data-i18n="settingsTitle">Cài đặt Hoạt động</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="add-activity-form">
                    <input type="text" id="newActVi" placeholder="Tên (Tiếng Việt)" class="input-field">
                    <input type="text" id="newActEn" placeholder="Name (English)" class="input-field">
                    <input type="color" id="newActColor" value="#6366f1" class="color-picker" title="Chọn màu">
                    <button id="btnAddActivity" class="primary-btn"><i class="fa-solid fa-plus"></i></button>
                </div>
                
                <div id="activityList" class="settings-activity-list">
                    <!-- Javascript sinh danh sách -->
                </div>
            </div>
            
            <div class="modal-footer">
                <p class="warning-text" data-i18n="settingsWarning">* Lưu ý: Xóa hoạt động cũ có thể làm mất dữ liệu đã đánh dấu của môn đó.</p>
                <button id="btnSaveConfig" class="primary-btn wide-btn" data-i18n="saveBtn">Lưu & Áp Dụng</button>
            </div>
        </div>
    </div>
    
    <div class="app-container">
        <!-- Calendar Section -->
        <main class="calendar-section glass-panel">
            <header class="calendar-header">
                <div class="calendar-nav">
                    <button id="prevMonth" class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                    <div class="month-display">
                        <h2 id="currentMonthYear">Tháng 10, 2023</h2>
                    </div>
                    <button id="nextMonth" class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                
                <div class="date-jump-controls">
                    <button id="btnToday" class="today-btn" data-i18n="todayBtn">Hôm nay</button>
                    <input type="date" id="jumpDateInput" class="jump-date-input" title="Chọn ngày để chuyển đến">
                </div>
            </header>
            
            <div class="weekdays" id="weekdaysGrid">
                <!-- Javascript sinh thứ -->
            </div>
            
            <div id="calendarGrid" class="calendar-grid">
                <!-- Days will be generated by JS -->
                
                <!-- Box Ghi chú nằm ngang bên dưới Lịch, chèn vào ngay trong Grid -->
                <div class="calendar-footer" id="calendarNotesArea">
                    <div class="notes-card" style="margin-bottom: 0;">
                        <h3 data-i18n="notesTitle">Ghi chú</h3>
                        <textarea id="dailyNote" data-i18n-placeholder="notesPlaceholder" placeholder="Nhập ghi chú cho ngày này..."></textarea>
                    </div>
                </div>
            </div>
        </main>

        <!-- Sidebar / Action Section -->
        <aside class="action-section">
            <div class="current-date-card glass-panel">
                <div class="solar-date-display">
                    <span id="displayDayName" class="day-name">Thứ Hai</span>
                    <span id="displayDate" class="date-num">15</span>
                    <span id="displayMonthYear" class="month-year">Tháng 10, 2023</span>
                </div>
                <div class="lunar-date-display">
                    <span data-i18n="lunarText">Âm lịch: </span><strong id="displayLunarDate">1/9</strong>
                </div>
            </div>

            <div class="habits-card glass-panel">
                <h3 data-i18n="habitsTitle">Thói Quen Mỗi Ngày</h3>
                <p class="subtitle" data-i18n="habitsSub">Đánh dấu khi bạn hoàn thành</p>
                
                <div class="habit-list" id="dynamicHabitList">
                    <!-- JS Tự động sinh danh sách Checkbox Động -->
                </div>
                
                <div class="quick-add-habit">
                    <input type="text" id="quickAddInput" data-i18n-placeholder="quickAddPlaceholder" placeholder="Thêm hoạt động..." class="quick-add-input">
                    <button id="btnQuickAdd" class="quick-add-btn" title="Thêm"><i class="fa-solid fa-plus"></i></button>
                    <button id="btnToggleEdit" class="quick-edit-btn" title="Chỉnh sửa"><i class="fa-solid fa-pen"></i></button>
                </div>
            </div>

            <div class="stats-card glass-panel">
                <h3 data-i18n="statsTitle">Thống Kê Tiến Độ</h3>
                
                <div class="tabs">
                    <button class="tab-btn active" data-range="week" data-i18n="tabWeek">Tuần</button>
                    <button class="tab-btn" data-range="month" data-i18n="tabMonth">Tháng</button>
                    <button class="tab-btn" data-range="year" data-i18n="tabYear">Năm</button>
                </div>

                <div class="stats-grid" id="dynamicStatsGrid">
                    <!-- JS Tự động sinh danh sách Thống kê Động -->
                </div>
            </div>
        </aside>
    </div>

    <!-- Firebase SDK (Version 8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Script that translates solar dates to lunar dates -->
    <script src="https://unpkg.com/lunar-javascript/lunar.js"></script>
    <script src="script.js"></script>
</body>
</html>
